<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Библиотека инструкций</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16191f; --soft:#3d434e; --muted:#6b7280; --line:#e9e6df;
    --bg:#fbfaf7; --card:#ffffff; --gold:#8f7327; --gold-soft:#f4eeda;
    --radius:18px; --shadow:0 1px 2px rgba(20,23,31,.04),0 10px 30px rgba(20,23,31,.06);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:400 18px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:max(28px,env(safe-area-inset-top)) 18px calc(56px + env(safe-area-inset-bottom));}
  .wrap{max-width:760px;margin:0 auto}
  header{padding:28px 0 10px}
  .kicker{font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(32px,7vw,46px);
    line-height:1.08;margin:.3em 0 .25em;letter-spacing:-.01em}
  .lead{color:var(--soft);font-size:19px;margin:0 0 8px;max-width:60ch}
  .grid{display:flex;flex-direction:column;gap:14px;margin-top:26px}
  .card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px 18px;text-decoration:none;color:inherit;
    box-shadow:var(--shadow);transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(20,23,31,.05),0 16px 40px rgba(20,23,31,.1);border-color:var(--gold-soft)}
  .card-emoji{font-size:30px;line-height:1;width:54px;height:54px;flex:0 0 54px;display:flex;
    align-items:center;justify-content:center;background:var(--gold-soft);border-radius:14px}
  .card-body{flex:1;min-width:0}
  .card-title{font-size:21px;font-weight:600;margin:0 0 3px}
  .card-sum{margin:0;color:var(--muted);font-size:16px;line-height:1.5}
  .card-date{margin-top:8px;color:#9aa0aa;font-size:13px}
  .card-arrow{width:22px;height:22px;color:var(--gold);flex:0 0 auto}
  .empty{color:var(--muted);background:var(--card);border:1px dashed var(--line);
    border-radius:var(--radius);padding:28px;text-align:center;margin-top:26px}
  footer{margin-top:46px;padding-top:22px;border-top:1px solid var(--line);color:#9aa0aa;font-size:14px}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="kicker">Библиотека</div>
      <h1>Простые инструкции</h1>
      <p class="lead">Понятные пошаговые инструкции на разные темы. Открывай любую и делай по шагам.</p>
    </header>
    <main>

    <div class="grid">
      <a class="card" href="./kak-sdelat-skrinshot-na-mac/">
        <div class="card-emoji">📸</div>
        <div class="card-body">
          <h2 class="card-title">Как сделать скриншот на Mac</h2>
          <p class="card-sum">Снять весь экран или его часть, найти файл и переслать. Пошагово, для новичка.</p>
          <div class="card-date">2026-06-22</div>
        </div>
        <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
    </main>
    <footer>Обновлено: 2026-06-22. Всего инструкций: 1.</footer>
  </div>
</body>
</html>
